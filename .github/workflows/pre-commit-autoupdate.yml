name: pre-commit autoupdate

on:
  schedule:
    - cron: "0 2 * * 1" # Every Monday 02:00 UTC (09:00 Bangkok)
  workflow_dispatch:

jobs:
  autoupdate:
    name: Update pre-commit hooks
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run autoupdate
        run: pre-commit autoupdate

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(deps): pre-commit autoupdate"
          title: "chore(deps): pre-commit autoupdate"
          body: |
            Automated weekly update of pre-commit hook versions.

            Generated by [pre-commit autoupdate](https://pre-commit.com/#pre-commit-autoupdate).
          branch: chore/pre-commit-autoupdate
          labels: dependencies
          delete-branch: true
